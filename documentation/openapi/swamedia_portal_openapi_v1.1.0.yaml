        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Unit share dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {description: Unit sudah punya share pada proyek ini, atau total melebihi nilaiProyek}
  /api/v1/business/proyek/{proyekId}/unit-share/{id}:
    parameters:
      - {name: proyekId, in: path, required: true, schema: {type: integer}}
      - {name: id, in: path, required: true, schema: {type: integer}}
