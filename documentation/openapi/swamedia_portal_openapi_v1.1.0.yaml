    parameters: [{name: proyekId, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Unit Share]
      summary: Daftar pembagian nilai proyek antar unit
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      responses:
        '200': {description: Daftar unit share diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
