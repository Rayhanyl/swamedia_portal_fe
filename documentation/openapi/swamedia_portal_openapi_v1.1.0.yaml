  # ───────────────────────── Pengaturan ─────────────────────────
  /api/v1/profil-saya:
    get:
      tags: [Profil Saya]
      summary: Profil karyawan milik sendiri
      description: >-
        Tidak di-gate RBAC — self-service, karyawan di-resolve dari klaim `sub` token
        (`karyawan.subject_id`). 404 bila subjectId belum ditautkan admin.
      responses:
        '200': {description: Profil diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Profil Saya]
      summary: Update kontak (email/noHp saja)
      description: Tidak di-gate RBAC. Identitas (nik/nama/jabatan/unit/status) tetap dikelola admin lewat Karyawan.
      requestBody:
        required: true
        description: 'email, noHp?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Profil diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/akun-saya:
    get:
      tags: [Akun Saya]
      summary: Identitas login WSO2 IS milik pemanggil (prefill form)
      description: >-
        Tidak di-gate RBAC — self-service, target selalu diri sendiri (di-resolve dari klaim `sub`
        token). Berbeda dari Profil Saya (kontak HR lokal); ini identitas IS via SCIM2.
      responses:
        '200': {description: Akun diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
    put:
      tags: [Akun Saya]
      summary: Update data akun sendiri (tanpa password/role)
      description: >-
        Tidak di-gate RBAC. Semua field opsional (min. satu). Password diubah lewat endpoint
        terpisah `/api/v1/akun-saya/password`; role tidak bisa diubah di sini.
      requestBody:
        required: true
        description: 'email?, firstName?, lastName?, telepon?, organization?, country?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Akun diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/akun-saya/password:
    put:
      tags: [Akun Saya]
      summary: Ganti password sendiri (terpisah dari update data)
      description: Tidak di-gate RBAC — target selalu diri sendiri. Dijalankan via SCIM2 (Super Admin IS).
      requestBody:
        required: true
        description: 'password (>=6)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Password diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/menu-saya:
    get:
      tags: [Menu Saya]
      summary: Pohon menu navigasi terfilter sesuai role pemanggil
      description: >-
        Tidak di-gate RBAC — self-service. Mengembalikan pohon menu yang di-assign ke role
        pemanggil (dan berstatus AKTIF); role di-resolve dari klaim `swaportal_role_id`, bukan
        id dari client. Cache-aside `role:{id}:menu`. 403 bila akun belum punya role.
      responses:
        '200': {description: Menu diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /api/v1/notifikasi/unread-count:
    get:
      tags: [Notifikasi]
      summary: Jumlah notifikasi belum dibaca
      description: Tidak di-gate RBAC — self-service.
      responses:
        '200': {description: Jumlah diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/notifikasi:
    get:
      tags: [Notifikasi]
      summary: Daftar notifikasi (filter kategori/is_read)
      description: Tidak di-gate RBAC — self-service.
      parameters:
        - {name: kategori, in: query, schema: {type: string}}
        - {name: is_read, in: query, schema: {type: boolean}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar notifikasi diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/notifikasi/read-all:
    put:
      tags: [Notifikasi]
      summary: Tandai semua notifikasi sudah dibaca
      description: Tidak di-gate RBAC.
      responses:
        '200': {description: Semua ditandai dibaca}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/notifikasi/{id}/read:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    put:
      tags: [Notifikasi]
      summary: Tandai satu notifikasi sudah dibaca
      description: Tidak di-gate RBAC.
      responses:
        '200': {description: Ditandai dibaca}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/konfigurasi-sistem:
    get:
      tags: [Konfigurasi Sistem]
      summary: Daftar registry sys_config
      x-roles-allowed: [Super Admin]
      parameters: [{name: search, in: query, schema: {type: string}}]
      responses:
        '200': {description: Daftar konfigurasi diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /api/v1/konfigurasi-sistem/{konfigKey}:
    parameters: [{name: konfigKey, in: path, required: true, schema: {type: string}}]
    get:
      tags: [Konfigurasi Sistem]
      summary: Detail satu konfigurasi
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Detail konfigurasi diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Konfigurasi Sistem]
      summary: Ubah value konfigurasi
      x-roles-allowed: [Super Admin]
      description: Hanya `value` yang bisa diubah — tidak ada create/delete key baru.
      requestBody:
        required: true
        description: 'value (nullable)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Konfigurasi diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/manajemen-user:
    get:
      tags: [Manajemen User]
      summary: Daftar user WSO2 IS (mirror user_cache, LEFT JOIN karyawan)
      x-roles-allowed: [Super Admin]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar user diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      tags: [Manajemen User]
      summary: Provision user baru via SCIM2 (+ write-through user_cache)
      x-roles-allowed: [Super Admin]
      description: >-
        Menulis ke WSO2 IS lewat SCIM2 (bukan DB ini), lalu mirror ke user_cache. BELUM
        terverifikasi terhadap WSO2 IS nyata — lihat README (Manajemen User).
      requestBody:
        required: true
        description: 'userName, email, nama, password (>=6), roleId? (ke swaportal_role_id)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: User dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/manajemen-user/{subjectId}:
    parameters: [{name: subjectId, in: path, required: true, schema: {type: string}}]
    get:
      tags: [Manajemen User]
      summary: Detail satu user WSO2 IS (+ karyawan tertaut, bila ada)
      x-roles-allowed: [Super Admin]
      responses:
