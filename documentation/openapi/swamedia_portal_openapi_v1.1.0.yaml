      tags: [Proyek]
      summary: Riwayat perubahan status proyek
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      responses:
        '200': {description: Riwayat status diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
