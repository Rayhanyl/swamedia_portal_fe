      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: customer_id, in: query, schema: {type: integer}}
        - {name: industri_id, in: query, schema: {type: integer}}
        - {name: unit_id, in: query, schema: {type: integer}}
        - {name: status, in: query, schema: {type: string}}
        - {name: tahun, in: query, schema: {type: integer}}
