        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/manajemen-user/{subjectId}/akun:
    parameters: [{name: subjectId, in: path, required: true, schema: {type: string}}]
    get:
      tags: [Manajemen User]
      summary: Identitas WSO2 IS user lain (prefill form Super Admin)
      x-roles-allowed: [Super Admin]
      description: Dibaca via SCIM2 sebagai Super Admin IS (Basic Auth).
      responses:
        '200': {description: Akun user diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
    put:
      tags: [Manajemen User]
      summary: Super Admin ubah data akun user lain (tanpa password)
      x-roles-allowed: [Super Admin]
      description: >-
        Via SCIM2 sebagai Super Admin IS (Basic Auth). Semua field opsional (min. satu). Password
        direset lewat endpoint terpisah `/api/v1/manajemen-user/{subjectId}/password`. `roleId` hanya
        set (untuk clear pakai `/role` dengan roleId null).
      requestBody:
        required: true
        description: 'email?, firstName?, lastName?, telepon?, organization?, country?, roleId?, groupId?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Akun user diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/manajemen-user/{subjectId}/password:
    parameters: [{name: subjectId, in: path, required: true, schema: {type: string}}]
    put:
      tags: [Manajemen User]
      summary: Super Admin reset password user lain (terpisah)
      x-roles-allowed: [Super Admin]
      description: Via SCIM2 sebagai Super Admin IS (Basic Auth). Operasi terpisah dari update data `/akun`.
      requestBody:
        required: true
        description: 'password (>=6)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Password user diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}

