      summary: Hapus unit share
      x-roles-allowed: [Super Admin, Manager, Assistant Manager]
      responses:
        '200': {description: Unit share dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
