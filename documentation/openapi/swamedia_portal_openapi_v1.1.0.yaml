        '200': {description: Daftar proyek diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [Proyek]
      summary: Buat proyek baru
      x-roles-allowed: [Super Admin, Manager, Assistant Manager]
      description: >-
        `kodeProyek` digenerate backend (`{prefix}-{kodeUnit}-{tahun}-{urutan}`) secara atomik
        per (unit, tahun). Status awal otomatis dicatat ke log_status.
      requestBody:
        required: true
        description: 'customerId, industriId, unitId, namaProyek, nilaiProyek, picSalesId, status?, tahun, ...'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Proyek dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/business/proyek/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Proyek]
      summary: Detail proyek
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      responses:
        '200': {description: Detail proyek diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Proyek]
      summary: Ubah proyek
      x-roles-allowed: [Super Admin, Manager, Assistant Manager]
      description: >-
        `unitId`/`tahun` immutable (tertanam di kodeProyek). Perubahan `status` dicatat ke
        log_status; transisi pertama ke DEAL_KONTRAK mengisi `tanggalDeal` otomatis.
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Proyek diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Proyek]
      summary: Soft delete proyek
      x-roles-allowed: [Super Admin, Manager, Assistant Manager]
      responses:
        '200': {description: Proyek dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: Masih memiliki sub-resource/rujukan aktif}
  /api/v1/business/proyek/{id}/log-status:
