components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Access Token WSO2 IS, divalidasi Ballerina deklaratif via `@http:ServiceConfig` (JWKS:
        signature, issuer, audience, expiry). Header `apikey` (WSO2 APIM) tidak didefinisikan
        di kontrak ini (divalidasi API Gateway).
  responses:
    BadRequest:
      description: Validasi gagal (lihat `errors.message` untuk detail field)
      content:
        application/json:
          schema:
            type: object
            properties:
              success: {type: boolean, example: false}
              message: {type: string}
              data: {nullable: true, example: null}
              errors:
                type: object
                nullable: true
                properties:
                  code: {type: string, example: VALIDATION_ERROR}
                  message: {type: string}
                  details: {nullable: true}
              meta:
                type: object
                properties: {timestamp: {type: string, format: date-time}}
    Unauthorized:
      description: >-
        Tidak terautentikasi. Dua bentuk body mungkin terjadi: (1) PALING UMUM — ditolak guard
        JWT sebelum resource dijalankan, format bawaan framework Ballerina (BUKAN amplop
        ApiResponse): `{timestamp, status, reason, message, path, method}`; (2) JARANG — dari
        `subjectFromAccessToken()` di kode aplikasi, memakai amplop ApiResponse standar
        (`errors.code = UNAUTHORIZED`). FE sebaiknya bercabang dari HTTP status 401 saja.
      content:
        application/json:
          schema: {type: object}
    Forbidden:
      description: >-
        Ditolak `PermissionInterceptor` — role pemanggil tidak memiliki bit CRUD/approve/export
        yang dibutuhkan pada modul ini (lihat `x-roles-allowed` operation ini untuk role yang
        diizinkan). `errors.code = FORBIDDEN`.
      content:
        application/json:
          schema:
            type: object
            properties:
              success: {type: boolean, example: false}
              message: {type: string, example: 'Anda tidak memiliki hak ... pada modul ...'}
              data: {nullable: true, example: null}
              errors:
                type: object
                properties:
                  code: {type: string, example: FORBIDDEN}
                  message: {type: string}
              meta:
                type: object
                properties: {timestamp: {type: string, format: date-time}}
    NotFound:
      description: Resource tidak ditemukan (`errors.code = NOT_FOUND`)
      content:
        application/json:
          schema: {type: object}
    InternalError:
      description: Error tak terduga di server (`errors.code = INTERNAL_ERROR`)
      content:
        application/json:
          schema: {type: object}
