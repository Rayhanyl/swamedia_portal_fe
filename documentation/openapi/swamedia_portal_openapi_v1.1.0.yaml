  # ───────────────────────── Finansial ─────────────────────────
  /api/v1/finance/tagihan:
    get:
      tags: [Tagihan]
      summary: Daftar tagihan (paginated)
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: proyek_id, in: query, schema: {type: integer}}
        - {name: status_aktif, in: query, schema: {type: string, enum: [RENCANA, BAST, KIRIM_TAGIHAN, LUNAS, PELUANG, TIDAK_TERTAGIH]}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar tagihan diambil (termasuk totalPencairan terhitung)}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [Tagihan]
      summary: Buat tagihan baru
      x-roles-allowed: [Super Admin, Finance]
      description: Status awal otomatis dicatat ke status_tagihan (mirip log_status proyek).
      requestBody:
        required: true
        description: 'proyekId, tanggalTagihan, noTagihan (unik), nilaiTagihan, statusAktif? (default RENCANA), nilaiDpp?, ppn?, pph?, keterangan?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Tagihan dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {description: noTagihan sudah digunakan}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/finance/tagihan/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Tagihan]
      summary: Detail tagihan
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      responses:
        '200': {description: Detail tagihan diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Tagihan]
      summary: Ubah tagihan
      x-roles-allowed: [Super Admin, Finance]
      description: Perubahan `statusAktif` dicatat ke status_tagihan (transaksional, dengan row lock).
      requestBody:
        required: true
        description: 'proyekId, tanggalTagihan, noTagihan, statusAktif, statusKomentar?, nilaiTagihan, nilaiDpp?, ppn?, pph?, keterangan?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Tagihan diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: noTagihan (baru) sudah dipakai}
    delete:
      tags: [Tagihan]
      summary: Soft delete tagihan
      x-roles-allowed: [Super Admin, Finance]
      responses:
        '200': {description: Tagihan dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
