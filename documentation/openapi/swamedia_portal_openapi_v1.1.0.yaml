        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [Kontrak Biasa]
      summary: Buat kontrak biasa baru
      description: Tidak di-gate RBAC. Bisa berdiri sendiri atau di bawah kontrak payung (customer sama).
      requestBody:
        required: true
        description: 'kontrakPayungId? (nullable), customerId, noKontrakBiasa (unik), namaKontrak, tanggalKontrak, nilai?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Kontrak biasa dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {description: noKontrakBiasa sudah digunakan}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/business/kontrak-biasa/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Kontrak Biasa]
      summary: Detail kontrak biasa
      description: Tidak di-gate RBAC.
      responses:
        '200': {description: Detail kontrak biasa diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Kontrak Biasa]
      summary: Ubah kontrak biasa (full-replace semantics)
      description: 'Tidak di-gate RBAC. Field opsional yang diomit (kontrakPayungId, nilai) mengosongkan kolom tsb.'
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Kontrak biasa diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: noKontrakBiasa (baru) sudah dipakai}
    delete:
      tags: [Kontrak Biasa]
      summary: Soft delete kontrak biasa
      description: Tidak di-gate RBAC. Ditolak bila masih dipakai proyek.
      responses:
        '200': {description: Kontrak biasa dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: Masih dipakai Proyek}

