openapi: 3.0.3
info:
  title: Swamedia Portal API
  description: >-
    Kontrak OpenAPI — Swamedia Project Website Portal Backend. Mencakup seluruh endpoint yang
    sudah dibangun: Auth BFF (WSO2 IS), Dashboard, RBAC (Role/Menu/Modul/Role Permission/Role
    Menu), seluruh Master Data, Sales Unit (Proyek + sub-resource), Kontrak Payung/Biasa,
    Revenue Unit, e-Office (Daftar Surat), Pengaturan (Profil Saya/Notifikasi/Konfigurasi
    Sistem/Manajemen User), Audit Log, dan Finansial (Tagihan/Pencairan/Pembayaran/Pengeluaran
    Perusahaan/Saldo Awal Kas).


    VERSI RINGKAS: Dokumen ini SENGAJA tidak menyertakan `components.schemas` (bentuk detail
    tiap request/response body) — hanya daftar endpoint (path, method, parameter, ringkasan
    aksi, kode status, dan `x-roles-allowed`). Bentuk payload lengkap ada di
    `modules/models/models.bal`.


    ARSITEKTUR: BFF (Backend-For-Frontend) di depan WSO2 Identity Server (IS) untuk auth,
    dipublikasikan lewat WSO2 API Manager (APIM) sebagai API Gateway. Frontend mengirim DUA
    header kredensial: `Authorization: Bearer <access_token>` (WSO2 IS) dan `apikey` (APIM) —
    header `apikey` tidak didefinisikan di kontrak ini (dikonfigurasi di level APIM).


    RESPONSE STANDARD: Semua response (sukses/error) dibungkus SATU amplop `ApiResponse` yang
    sama: `{ success, message, data, errors, meta }`. `meta.pagination` hanya ada pada endpoint
    list berpaginasi.


    CATATAN 401 (dua bentuk body berbeda — lihat `components.responses.Unauthorized`):
    (1) penolakan oleh guard JWT `@http:ServiceConfig` (paling sering) mengembalikan format
    bawaan framework Ballerina, BUKAN amplop `ApiResponse`; (2) kegagalan `subjectFromAccessToken()`
    (jarang) memang mengembalikan amplop `ApiResponse`. FE sebaiknya bercabang dari HTTP status
    code 401 saja, bukan dari bentuk body.


    RBAC (v1.2 — ENFORCEMENT AKTIF): Setiap service (kecuali yang ditandai "tidak di-gate")
    kini dijaga `PermissionInterceptor` (lihat `main.bal`) yang membaca role pemanggil dari
    klaim `swaportal_role_id` (userinfo), memuat matriks `role_permission` role tsb dari cache
    Redis, dan mengembalikan 403 bila bit CRUD/approve/export yang dibutuhkan tidak dimiliki.
    Extension `x-roles-allowed` pada tiap operation bersumber LANGSUNG dari seed matriks
    `role_permission` di `documentation/database/swamedia_portal_schema_v2.1.sql` — bukan
    dugaan. Operation TANPA `x-roles-allowed` berarti modul tsb tidak dimiliki oleh role
    manapun selain Super Admin, ATAU service-nya sengaja tidak di-gate RBAC (self-service /
    data referensi bersama) — dicatat eksplisit di `description` operation tsb.

    Dua hal yang masih DITUNDA (bit dibaca tapi belum ditegakkan penuh): (a) `scope =
    UNIT_SENDIRI` (penyaringan baris per unit pemanggil), (b) validasi `karyawan.unit_id =
    "Direktur Utama"` untuk approval Direktur (baru bit `can_approve` level-role yang dicek).


    CATATAN KEAMANAN — Karyawan.subjectId: menautkan karyawan ke identitas WSO2 IS, sensitif —
    hanya muncul di response DETAIL, tidak di LIST; keunikannya dicek manual (409 bila bentrok).
  version: 1.1.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: WSO2 IS authentication/session endpoints
  - name: Dashboard
    description: Ringkasan KPI sebelum login
  - name: Business
    description: Endpoint pembuktian guard JWT
  - name: Role
    description: RBAC — master Role
  - name: Menu
    description: RBAC — master Menu (navigasi hierarkis)
  - name: Modul
    description: RBAC — master Modul aplikasi (read-only)
  - name: Role Permission
    description: RBAC — matriks permission per role x modul
  - name: Role Menu
    description: RBAC — assignment menu per role
  - name: Unit
    description: Master data unit organisasi
  - name: Industri
    description: Master data industri
  - name: Tags
    description: Master data label/tag untuk Proyek (tidak di-gate RBAC)
  - name: Resource Tags
    description: Master data label/tag untuk Resource Unit
  - name: Kategori Surat
    description: Master jenis surat (DR-01..DR-09)
  - name: Jabatan
    description: Master data jabatan karyawan (tidak di-gate RBAC)
  - name: Karyawan
    description: Master data karyawan
  - name: Customer
    description: Master data customer
  - name: Contact
    description: Master data kontak person milik Customer
  - name: Daftar Surat
    description: e-Office — penomoran surat
  - name: Proyek
    description: Sales Unit — Proyek
  - name: Unit Share
    description: Sales Unit — pembagian nilai proyek antar unit
  - name: Team Member
    description: Sales Unit — penugasan karyawan ke proyek
  - name: Proyek Tags
    description: Sales Unit — label pada proyek (M2M)
  - name: Kontrak Payung
    description: Sales Unit — kontrak payung + harga per role
  - name: Kontrak Biasa
    description: Sales Unit — kontrak biasa (tidak di-gate RBAC)
  - name: Target Revenue Unit
    description: Sales Unit — target revenue per unit per tahun
  - name: Revenue Unit
    description: Sales Unit — laporan target vs realisasi (read-only)
  - name: Target Sales Unit
    description: Sales Unit — target sales/deal per unit per tahun
  - name: Sales Matrix
    description: Sales Unit — pencapaian sales (target vs realisasi deal, read-only)
  - name: Resource Unit
    description: Master data resource unit (headcount/kapasitas per unit)
  - name: Kategori Finansial Keluar
    description: Master kategori Pembayaran/Pengeluaran (tidak di-gate RBAC)
  - name: Cashflow
    description: Laporan arus kas company-wide (read-only)
  - name: Profil Saya
    description: Pengaturan — self-service profil (tidak di-gate RBAC)
  - name: Akun Saya
    description: Pengaturan — self-service identitas login WSO2 IS via SCIM2 (tidak di-gate RBAC)
  - name: Menu Saya
    description: Pengaturan — pohon menu navigasi terfilter sesuai role pemanggil (self-service)
  - name: Notifikasi
    description: Pengaturan — inbox notifikasi self-service (tidak di-gate RBAC)
  - name: Konfigurasi Sistem
    description: Pengaturan — registry sys_config
  - name: Manajemen User
    description: Pengaturan — mirror user WSO2 IS (read) + write via SCIM2
  - name: Audit Log
    description: Read-only audit trail
  - name: Tagihan
    description: Finansial — tagihan proyek
  - name: Pencairan
    description: Finansial — pencairan tagihan (sub-resource Tagihan)
  - name: Pembayaran
    description: Finansial — cash-out proyek + approval
  - name: Pengeluaran Perusahaan
    description: Finansial — cash-out internal unit + approval
  - name: Saldo Awal Kas
    description: Finansial — saldo awal kas (append-only) + posisi kas
security:
  - bearerAuth: []
x-common:
  pageParam: &pageParam
    name: page
    in: query
    schema: {type: integer, default: 1}
  limitParam: &limitParam
    name: limit
    in: query
    schema: {type: integer, default: 20}
paths:
  # ───────────────────────── Auth ─────────────────────────
  /api/v1/auth/init:
    post:
      tags: [Auth]
      summary: Mulai flow login (opsional)
      description: Wraps WSO2 IS `POST /oauth2/authorize`. Publik.
      security: []
      responses:
        '200': {description: Flow dimulai}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login username/password
      description: Menjalankan init -> authenticate -> token exchange sekaligus. Publik.
      security: []
      requestBody:
        required: true
        description: 'username, password'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Login berhasil}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {description: Username/password salah}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/token:
    post:
      tags: [Auth]
      summary: Tukar authorization code menjadi token
      security: []
      requestBody:
        required: true
        description: 'code'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Token diambil}
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        description: 'refreshToken'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Token diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {description: Refresh token tidak valid/expired}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/userinfo:
    get:
      tags: [Auth]
      summary: Klaim user dari access token
      description: Wraps WSO2 IS `GET /oauth2/userinfo`; di-cache Redis 60 detik.
      parameters:
        - {name: Authorization, in: header, required: true, schema: {type: string}}
      responses:
        '200': {description: Userinfo diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/introspect:
    post:
      tags: [Auth]
      summary: Introspeksi token (RFC 7662)
      security: []
      requestBody:
        required: true
        description: 'token, tokenTypeHint?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Hasil introspeksi}
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/revoke:
    post:
      tags: [Auth]
      summary: Cabut token (+ denylist lokal)
      security: []
      requestBody:
        required: true
        description: 'token, tokenTypeHint?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Token dicabut}
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout dari WSO2 IS (+ denylist lokal)
      security: []
      requestBody:
        required: true
        description: 'idToken'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Logout berhasil}
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}

  # ───────────────────────── Dashboard / Business ─────────────────────────
  /api/v1/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: KPI card (Total Proyek, Revenue Bulan Ini, Target Sales Sisa, Posisi Kas)
      description: Publik, sebelum login.
      security: []
      responses:
        '200': {description: Ringkasan diambil}
  /api/v1/business/ping:
    get:
      tags: [Business]
      summary: Verifikasi access token (200 bila JWKS valid)
      responses:
        '200': {description: Token valid}
        '401': {$ref: '#/components/responses/Unauthorized'}

  # ───────────────────────── RBAC ─────────────────────────
  /api/v1/master/roles:
    get:
      tags: [Role]
      summary: Daftar role (paginated)
      x-roles-allowed: [Super Admin]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [AKTIF, TIDAK_AKTIF]}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar role diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [Role]
      summary: Buat role baru
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'kodeRole (unik), namaRole, deskripsi?, status? (default AKTIF)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Role dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {description: kodeRole sudah digunakan}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/master/roles/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Role]
      summary: Detail role
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Detail role diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Role]
      summary: Ubah role
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'kodeRole, namaRole, deskripsi?, status'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Role diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: kodeRole sudah digunakan}
        '500': {$ref: '#/components/responses/InternalError'}
    delete:
      tags: [Role]
      summary: Hapus role (hard delete, cascade role_permission/role_menu)
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Role dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/master/menu/tree:
    get:
      tags: [Menu]
      summary: Hierarki menu (nested children)
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Hierarki menu diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /api/v1/master/menu:
    get:
      tags: [Menu]
      summary: Daftar menu (paginated, flat)
      x-roles-allowed: [Super Admin]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [AKTIF, TIDAK_AKTIF]}}
        - {name: parent_id, in: query, schema: {type: integer}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar menu diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      tags: [Menu]
      summary: Buat menu baru
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'parentId? (nullable), kodeMenu, namaMenu, path?, icon?, urutan?, status?'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Menu dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {description: kodeMenu sudah digunakan}
  /api/v1/master/menu/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Menu]
      summary: Detail menu
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Detail menu diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Menu]
      summary: Ubah menu
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'parentId? (nullable), kodeMenu, namaMenu, path?, icon?, urutan, status'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Menu diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: kodeMenu sudah digunakan}
    delete:
      tags: [Menu]
      summary: Hapus menu
      x-roles-allowed: [Super Admin]
      description: Ditolak bila masih memiliki sub-menu aktif atau masih di-assign ke suatu role.
      responses:
        '200': {description: Menu dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: Masih memiliki sub-menu aktif atau di-assign ke role}
  /api/v1/master/modul:
    get:
      tags: [Modul]
      summary: Daftar modul aplikasi (read-only, master tetap)
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Daftar modul diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /api/v1/master/role-permissions/{roleId}:
    parameters: [{name: roleId, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Role Permission]
      summary: Matriks permission penuh untuk satu role (semua modul)
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Matriks diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Role Permission]
      summary: Simpan seluruh matriks permission role (replace wholesale)
      x-roles-allowed: [Super Admin]
      description: >-
        Menginvalidate cache Redis `role:{roleId}:permissions` yang dibaca PermissionInterceptor
        — perubahan langsung berlaku pada request berikutnya.
      requestBody:
        required: true
        description: 'items[]: {modulId, canCreate, canRead, canUpdate, canDelete, canApprove, canExport, scope}'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Matriks disimpan}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/master/role-menus/{roleId}:
    parameters: [{name: roleId, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Role Menu]
      summary: Tree menu + flag assigned untuk satu role
      x-roles-allowed: [Super Admin]
      responses:
        '200': {description: Assignment diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Role Menu]
      summary: Simpan seluruh assignment menu role (replace wholesale)
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'menuIds: int[]'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Assignment disimpan}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  # ───────────────────────── Master Data ─────────────────────────
  /api/v1/master/units:
    get:
      tags: [Unit]
      summary: Daftar unit (paginated)
      x-roles-allowed: [Super Admin, Direktur, Manager, Finance]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [AKTIF, TIDAK_AKTIF]}}
        - {name: parent_id, in: query, schema: {type: integer}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar unit diambil}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [Unit]
      summary: Buat unit baru
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'namaUnit (3-100), kodeUnit (1-20, unik), parentUnitId? (nullable), status? (default AKTIF)'
        content: {application/json: {schema: {type: object}}}
      responses:
        '201': {description: Unit dibuat}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {description: Nama unit atau kodeUnit sudah digunakan}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/master/units/tree:
    get:
      tags: [Unit]
      summary: Hierarki unit (nested children, dari view v_unit)
      x-roles-allowed: [Super Admin, Direktur, Manager, Finance]
      responses:
        '200': {description: Hierarki unit diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/master/units/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    get:
      tags: [Unit]
      summary: Detail unit
      x-roles-allowed: [Super Admin, Direktur, Manager, Finance]
      responses:
        '200': {description: Detail unit diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
    put:
      tags: [Unit]
      summary: Ubah unit
      x-roles-allowed: [Super Admin]
      requestBody:
        required: true
        description: 'namaUnit, kodeUnit, parentUnitId? (nullable, tidak boleh referensi melingkar), status'
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Unit diperbarui}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: Nama unit/kodeUnit sudah dipakai unit lain}
        '500': {$ref: '#/components/responses/InternalError'}
    delete:
      tags: [Unit]
      summary: Soft delete unit
      x-roles-allowed: [Super Admin]
      description: Ditolak jika masih memiliki sub-unit aktif.
      responses:
        '200': {description: Unit dihapus}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {description: Masih memiliki sub-unit aktif}
        '500': {$ref: '#/components/responses/InternalError'}
  /api/v1/master/industries:
    get:
      tags: [Industri]
      summary: Daftar industri (paginated)
      x-roles-allowed: [Super Admin, Direktur, Manager, Assistant Manager, Finance]
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar industri diambil}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
