  /api/v1/business/kontrak-biasa:
    get:
      tags: [Kontrak Biasa]
      summary: Daftar kontrak biasa (paginated)
      description: Tidak di-gate RBAC.
      parameters:
        - {name: search, in: query, schema: {type: string}}
        - {name: customer_id, in: query, schema: {type: integer}}
        - {name: kontrak_payung_id, in: query, schema: {type: integer}}
        - *pageParam
        - *limitParam
      responses:
        '200': {description: Daftar kontrak biasa diambil}
