    EmptyApiResponse:
      type: object
      description: Used by endpoints that succeed with no payload (revoke, logout).
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout berhasil
        data:
          nullable: true
          example: null
        errors:
          nullable: true
          example: null
        meta:
          $ref: '#/components/schemas/AuthResponseMeta'
    RequestBindingErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        reason:
          type: string
          example: Bad Request
        message:
          type: string
          example: 'data binding failed: unrecognized token ...'
        path:
          type: string
          example: /api/v1/auth/login
        method:
          type: string
          example: POST
