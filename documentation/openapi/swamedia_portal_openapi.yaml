openapi: 3.0.3
info:
  title: Swamedia Portal API
  description:
    'Spesifikasi gabungan untuk Swamedia Portal: Auth BFF API dan Master Data API.


    AUTH BFF API:

    Backend-for-Frontend facade over WSO2 Identity Server. The frontend only ever calls these endpoints; the Ballerina backend alone talks to WSO2 IS (URLs, client_id, client_secret, flowId and authorization codes never reach the frontend).


    MASTER DATA API:

    Spesifikasi gabungan (bundle) seluruh endpoint `/api/v1/master/*` -- Unit, Industri, Tags, Resource Tags, Kategori Surat, Karyawan, Customer, Contact. File INI (bukan file per-modul di folder yang sama) yang dipakai untuk import ke WSO2 API Manager (APIM) Publisher sebagai satu API "Master Data", karena seluruhnya dipublikasikan dari satu service group Ballerina yang sama dengan proteksi JWT yang identik.


    ARSITEKTUR: Backend ini adalah BFF (Backend-For-Frontend) di depan WSO2 Identity Server (IS) untuk auth, dan dipublikasikan lewat WSO2 API Manager (APIM) sebagai API Gateway. Alur request: Frontend -> WSO2 APIM -> Ballerina. Frontend mengirim DUA header kredensial: `Authorization: Bearer <access_token>` (Access Token WSO2 IS) dan `apikey` (API Key APIM). APIM memvalidasi API Key untuk meneruskan request; Ballerina memvalidasi Access Token lewat JWKS untuk autentikasi & otorisasi pengguna. Header `apikey` TIDAK didefinisikan di kontrak OpenAPI ini -- itu dikonfigurasi di level APIM, bukan di kontrak service ini.


    RESPONSE STANDARD: Semua response (sukses maupun error, 200/201/400/401/403/404/409/ 500) dibungkus SATU amplop `ApiResponse` yang sama (`components/schemas/ApiResponse`), sesuai README.md Bab 5 "API Response Standard". `data` bervariasi bentuknya per operasi -- lihat `example`/`examples` pada setiap response.


    CATATAN 401 (TERKONFIRMASI lewat pengujian): ada DUA bentuk body 401 yang berbeda. (1) Penolakan oleh guard `@http:ServiceConfig` (Bearer token tidak ada/tidak valid/ kedaluwarsa) terjadi SEBELUM resource function dijalankan -- Ballerina mengembalikan format bawaan framework (`FrameworkErrorResponse`), BUKAN amplop `ApiResponse`. Sudah diuji langsung terhadap versi `ballerina/http` yang dipakai proyek ini: baik `http:RequestErrorInterceptor` maupun `http:ResponseInterceptor` TIDAK dapat menangkap/menormalkan kasus ini -- penolakan auth dikirim lewat interop native ke `http:Caller`, memotong seluruh pipeline interceptor Ballerina. Ini kasus 401 yang paling sering terjadi di praktik. (2) Kegagalan di `subjectFromAccessToken()` pada endpoint POST/PUT/DELETE (jarang terjadi, defensif) -- kasus ini MEMANG mengembalikan amplop `ApiResponse` standar. FE WAJIB menangani kedua bentuk untuk status 401 (lihat `components.responses.Unauthorized`); rekomendasi: cabang logika "belum terautentikasi"
    di FE sebaiknya berdasarkan HTTP status code 401 saja, bukan mengasumsikan bentuk body.


    CATATAN KEAMANAN -- Karyawan.subjectId: field ini menautkan karyawan ke identitas WSO2 IS dan bersifat sensitif -- tidak pernah muncul di response LIST (`KaryawanListItem`), hanya di response DETAIL (`KaryawanDetail`); keunikannya dicek manual di service (409 CONFLICT bila bentrok); modul Karyawan idealnya dibatasi Role Admin di masa depan (role-based access control belum diterapkan di layer ini).'
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: WSO2 IS authentication/session endpoints
  - name: Unit
    description: Master data unit organisasi
  - name: Industri
    description: Master data industri
  - name: Tags
    description: Master data label/tag untuk Proyek
  - name: Resource Tags
    description: Master data label/tag untuk Resource Unit
  - name: Kategori Surat
    description: Master jenis surat (DR-01..DR-09)
  - name: Karyawan
    description: Master data karyawan
  - name: Customer
    description: Master data customer
  - name: Contact
    description: Master data kontak person milik Customer
  - name: Dashboard
    description: Ringkasan KPI sebelum login
  - name: Business
    description: Endpoint business/e-office yang tetap diproteksi JWT
  - name: Daftar Surat
    description: Master data nomor_surat untuk modul e-Office
  - name: Proyek
    description: Dropdown proyek untuk form Daftar Surat
security:
  - bearerAuth: []
paths:
  /api/v1/auth/init:
    post:
      tags:
        - Auth
      summary: Start the authentication flow
      description: Wraps WSO2 IS `POST /oauth2/authorize`. Returns a flowId and the authenticators available for that flow. Optional — the frontend can just call `/auth/login` directly for the standard username/password flow.
      responses:
        '200':
          description: Flow started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitApiResponse'
              example:
                success: true
                message: Flow autentikasi berhasil dimulai
                data:
                  flowId: e743338d-adb3-47a9-8158-72b8f4efcaca
                  authenticators:
                    - authenticatorId: QmFzaWNBdXRoZW50aWNhdG9yOkxPQ0FM
                      authenticator: Username & Password
                      idp: LOCAL
                      metadata:
                        i18nKey: authenticator.basic
                        promptType: USER_PROMPT
                      requiredParams:
                        - username
                        - password
                    - authenticatorId: R29vZ2xlT0lEQzpHb29nbGU
                      authenticator: Google
                      idp: Google
                      metadata:
                        i18nKey: authenticator.google
                errors: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
        '500':
          description: Failed to start the flow (WSO2 IS unreachable or misconfigured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
      security: []
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Log in with username and password
      description: Runs the full WSO2 IS flow server-side (init -> authenticate -> token exchange) and returns the token set plus the decoded id_token claims as `user`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: admin
              password: '!AdminSWA123#'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
              example:
                success: true
                message: Login berhasil
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    iss: https://iam.apicentrum.biz.id/oauth2/token
                    org_name: Super
                    exp: 1783070533
                    iat: 1783066933
                errors: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
        '400':
          description: Malformed request body (missing/invalid JSON fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/login
                method: POST
        '401':
          description: Username or password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Username atau password salah
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Username atau password salah
                  details: null
                meta:
                  timestamp: '2026-07-03T09:16:00Z'
        '500':
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:16:00Z'
      security: []
  /api/v1/auth/token:
    post:
      tags:
        - Auth
      summary: Exchange an authorization code for tokens
      description: Wraps WSO2 IS `POST /oauth2/token` using the `authorization_code` grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenExchangeRequest'
            example:
              code: acec171-ac3d-34e0-b4ee-fe52f2e3d94d
      responses:
        '200':
          description: Token set retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
              example:
                success: true
                message: Token berhasil diambil
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    iss: https://iam.apicentrum.biz.id/oauth2/token
                errors: null
                meta:
                  timestamp: '2026-07-03T09:17:00Z'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/token
                method: POST
        '500':
          description: Code invalid/expired or WSO2 IS unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:17:00Z'
      security: []
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh an access token
      description: Wraps WSO2 IS `POST /oauth2/token` using the `refresh_token` grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
      responses:
        '200':
          description: New token set issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
              example:
                success: true
                message: Token berhasil diperbarui
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-refreshed-access-token.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-refreshed-id-token.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    amr:
                      - refresh_token
                errors: null
                meta:
                  timestamp: '2026-07-03T09:18:00Z'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/refresh
                method: POST
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Refresh token tidak valid atau sudah expired
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Refresh token tidak valid atau sudah expired
                  details: null
                meta:
                  timestamp: '2026-07-03T09:18:00Z'
        '500':
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:18:00Z'
      security: []
  /api/v1/auth/userinfo:
    get:
      tags:
        - Auth
      summary: Get the authenticated user's claims
      description: Wraps WSO2 IS `GET /oauth2/userinfo`.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer access token obtained from `/auth/login`, `/token` or `/refresh`
          schema:
            type: string
          example: Bearer eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
      responses:
        '200':
          description: User claims retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoApiResponse'
              example:
                success: true
                message: Userinfo berhasil diambil
                data:
                  sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                errors: null
                meta:
                  timestamp: '2026-07-03T09:19:00Z'
        '401':
          description: Authorization header missing/malformed, or access token invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Access token tidak valid atau sudah expired
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Access token tidak valid atau sudah expired
                  details: null
                meta:
                  timestamp: '2026-07-03T09:19:00Z'
  /api/v1/auth/introspect:
    post:
      tags:
        - Auth
      summary: Introspect a token
      description: Wraps WSO2 IS `POST /oauth2/introspect` (RFC 7662), using client_secret_basic auth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntrospectRequest'
            example:
              token: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
              tokenTypeHint: access_token
      responses:
        '200':
          description: Introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectApiResponse'
              example:
                success: true
                message: Introspeksi token berhasil
                data:
                  active: true
                  scope: internal_login openid
                  client_id: RnIGkMGt5DkeTZqOcL9_m5z2t_Qa
                  username: admin
                  exp: 1783070533
                errors: null
                meta:
                  timestamp: '2026-07-03T09:20:00Z'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/introspect
                method: POST
        '500':
          description: WSO2 IS rejected or was unreachable for the introspection call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:20:00Z'
      security: []
  /api/v1/auth/revoke:
    post:
      tags:
        - Auth
      summary: Revoke a token
      description: Wraps WSO2 IS `POST /oauth2/revoke` (RFC 7009), using client_secret_basic auth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
            example:
              token: a962fcbf-b301-3948-a29f-22202bfb5923
              tokenTypeHint: refresh_token
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyApiResponse'
              example:
                success: true
                message: Token berhasil dicabut
                data: null
                errors: null
                meta:
                  timestamp: '2026-07-03T09:21:00Z'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/revoke
                method: POST
        '500':
          description: WSO2 IS rejected or was unreachable for the revoke call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:21:00Z'
      security: []
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: End the user's session
      description: Wraps WSO2 IS `POST /oidc/logout` using `id_token_hint`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            example:
              idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
      responses:
        '200':
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyApiResponse'
              example:
                success: true
                message: Logout berhasil
                data: null
                errors: null
                meta:
                  timestamp: '2026-07-03T09:22:00Z'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestBindingErrorResponse'
              example:
                timestamp: '2026-07-03T08:12:46.458339700Z'
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/logout
                method: POST
        '500':
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: '2026-07-03T09:22:00Z'
      security: []
  /api/v1/dashboard/summary:
    get:
      tags:
        - Dashboard
      summary: Get dashboard summary
      description: Returns the top-level KPI cards (Total Proyek, Revenue Bulan Ini, Deal Aktif).
      responses:
        '200':
          description: Dashboard summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/DashboardSummary'
                  errors:
                    nullable: true
                  meta:
                    $ref: '#/components/schemas/AuthResponseMeta'
              example:
                success: true
                message: Ringkasan dashboard berhasil diambil
                data:
                  totalProyek: 128
                  revenueBulanIni: 275000000
                  dealAktif: 14
                errors: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
      security: []
  /api/v1/business/ping:
    get:
      tags:
        - Business
      summary: Verify access token
      description: Returns 200 only if the caller's Bearer access token passed JWKS validation.
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    nullable: true
                  errors:
                    nullable: true
                  meta:
                    $ref: '#/components/schemas/AuthResponseMeta'
              example:
                success: true
                message: Token valid, akses diizinkan
                data: null
                errors: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/business/daftar-surat:
    get:
      tags:
        - Daftar Surat
      summary: Daftar surat (paginated)
      description: >-
        Optional search over nomor/tujuan/perihal, plus tahun/kategori/proyek filters.
        By default only active letters are returned; include_dibatalkan=true also includes
        cancelled rows for audit/report views.
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: tahun
          in: query
          schema:
            type: integer
        - name: kategori_surat_id
          in: query
          schema:
            type: integer
        - name: proyek_id
          in: query
          schema:
            type: integer
        - name: include_dibatalkan
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Daftar surat berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NomorSurat'
                  errors:
                    nullable: true
                  meta:
                    $ref: '#/components/schemas/AuthResponseMeta'
              example:
                success: true
                message: Daftar surat berhasil diambil
                data:
                  - id: 101
                    kategoriSuratId: 1
                    kategoriKode: DR-01
                    kategoriNama: Surat Undangan
                    proyekId: 12
                    kodeProyek: PRJ-001
                    namaProyek: Proyek A
                    tanggal: '2026-07-03'
                    tahun: 2026
                    urutan: 7
                    nomor: SK-DR-01-2026-007
                    tujuan: Direktur Operasional
                    perihal: Undangan rapat koordinasi
                    keterangan: null
                    alasanPembatalan: null
                    isDibatalkan: false
                errors: null
                meta:
                  timestamp: '2026-07-03T09:15:32Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
