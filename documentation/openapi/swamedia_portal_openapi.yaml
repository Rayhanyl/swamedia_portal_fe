components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Access Token dari WSO2 Identity Server (IS), divalidasi Ballerina secara deklaratif via `@http:ServiceConfig { auth: [...] }` memakai JWKS WSO2 IS (signature, issuer, audience, expiry). Header: `Authorization: Bearer <access_token>`. Header `apikey` (API Key WSO2 APIM) TIDAK didefinisikan di kontrak ini -- itu divalidasi oleh API Gateway (APIM), bukan oleh service ini.'
  responses:
    Unauthorized:
      description: Tidak terautentikasi. Ada DUA bentuk body yang mungkin terjadi -- lihat `examples` di bawah dan catatan lengkap di `info.description`.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ApiResponse'
              - $ref: '#/components/schemas/FrameworkErrorResponse'
          examples:
            guardRejection:
              summary: PALING UMUM -- ditolak guard JWT sebelum resource dijalankan (BUKAN amplop ApiResponse; TERKONFIRMASI lewat pengujian, tidak bisa dinormalkan lewat interceptor Ballerina)
              value:
                timestamp: '2026-07-05T02:00:00Z'
                status: 401
                reason: Unauthorized
                message: ''
                path: /api/v1/master/units
                method: GET
            applicationLevel:
              summary: JARANG -- dari subjectFromAccessToken() di kode aplikasi (memang amplop ApiResponse)
              value:
                success: false
                message: Access token tidak valid
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Access token tidak valid
                  details: null
                meta:
                  timestamp: '2026-07-05T02:00:00Z'
    Forbidden:
      description: Tidak punya akses. Reserved untuk role-based access control di masa depan (belum ditegakkan oleh endpoint mana pun saat ini).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Anda tidak memiliki akses untuk melakukan aksi ini
            data: null
            errors:
              code: FORBIDDEN
              message: Anda tidak memiliki akses untuk melakukan aksi ini
              details: null
            meta:
              timestamp: '2026-07-05T02:00:00Z'
    InternalError:
      description: Error tak terduga di server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            message: Terjadi kesalahan pada server, silakan coba lagi nanti
            data: null
            errors:
              code: INTERNAL_ERROR
              message: Terjadi kesalahan pada server, silakan coba lagi nanti
              details: null
            meta:
              timestamp: '2026-07-05T02:00:00Z'
  schemas:
    FrameworkErrorResponse:
      type: object
      description: Bentuk error BAWAAN Ballerina (BUKAN amplop ApiResponse), dipakai untuk penolakan yang terjadi SEBELUM resource function dijalankan -- terutama kegagalan guard JWT `@http:ServiceConfig` (401) dan kegagalan data-binding payload/parameter (400). TERKONFIRMASI lewat pengujian bahwa `http:RequestErrorInterceptor` dan `http:ResponseInterceptor` tidak dapat menormalkan bentuk ini ke amplop ApiResponse.
